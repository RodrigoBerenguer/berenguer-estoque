function log(msg, tipo) {
  var el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += '<div class="'+(tipo||'info')+'">'+msg+'</div>';
}

function confirmar() {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  executarReset();
}

async function executarReset() {
  log('🔄 Iniciando reset...', 'info');

  // 1. Limpar localStorage
  try {
    localStorage.removeItem('berg_ev');
    localStorage.removeItem('berg_solic');
    localStorage.removeItem('berg_perdas');
    localStorage.removeItem('berg_custos');
    localStorage.removeItem('berg_saveTime');
    // Manter o catálogo atualizado
    localStorage.setItem('berg_cat', JSON.stringify(CATALOGO_BASE));
    log('✅ localStorage limpo', 'ok');
  } catch(e) {
    log('⚠️ Erro no localStorage: ' + e.message, 'err');
  }

  // 2. Gravar dados limpos no Firebase
  var dadosLimpos = {
    evs: [],
    cat: CATALOGO_BASE,
    solics: [],
    perdas: [],
    custos: {},
    _savedAt: Date.now()
  };

  try {
    log('🔄 Gravando no Firebase...', 'info');
    var resp = await fetch(FB_URL + '/data.json', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dadosLimpos)
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    log('✅ Firebase atualizado com sucesso!', 'ok');
  } catch(e) {
    log('❌ Erro no Firebase: ' + e.message, 'err');
  }

  // Limpar sessão de login para forçar novo login
  localStorage.removeItem('berg_sessao');

  log('', 'info');
  log('✅ Reset concluído! Catálogo preservado (' + CATALOGO_BASE.length + ' itens).', 'ok');
  log('📋 Eventos, solicitações e perdas zerados.', 'info');
  log('🔑 Sessão encerrada — faça login novamente.', 'info');

  document.getElementById('titulo-step2').textContent = '✅ Reset concluído!';
  document.getElementById('desc-step2').textContent = 'Sistema limpo e pronto para uso.';
  document.getElementById('btn-ir').style.display = 'block';
}
